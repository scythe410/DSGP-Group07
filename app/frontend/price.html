<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Prediction - PRC DMG EVL SYS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo-title">PRC DMG EVL SYS</div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="price.html" class="nav-link active">Price Prediction</a>
            <a href="damage.html" class="nav-link">Damage Detection</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Vehicle Details</h2>
            <p>Enter vehicle specifications to estimate market value.</p>
        </div>

        <div class="card">
            <form id="price-form">
                <div class="form-grid">
                    <!-- Column 1 -->
                    <div>
                        <div class="form-group">
                            <label class="form-label">Make</label>
                            <input type="text" id="make" class="form-control" placeholder="e.g. Toyota" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Model</label>
                            <input type="text" id="model" class="form-control" placeholder="e.g. Axio" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Year of Manufacture</label>
                            <input type="number" id="yom" class="form-control" value="2018" min="1990" max="2026"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Mileage (km)</label>
                            <input type="number" id="mileage" class="form-control" value="50000" min="0" required>
                        </div>
                    </div>

                    <!-- Column 2 -->
                    <div>
                        <div class="form-group">
                            <label class="form-label">Engine Capacity (cc)</label>
                            <input type="number" id="engine" class="form-control" value="1500" min="600" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fuel Type</label>
                            <select id="fuel" class="form-control">
                                <option>Petrol</option>
                                <option>Diesel</option>
                                <option>Hybrid</option>
                                <option>Electric</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Gear</label>
                            <select id="gear" class="form-control">
                                <option>Automatic</option>
                                <option>Manual</option>
                                <option>CVT</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Condition</label>
                            <select id="condition" class="form-control">
                                <option>Used</option>
                                <option>Unregistered</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-top: 30px;">
                            <label class="form-label">Options</label>
                            <div class="checkbox-grid">
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="ac" checked>
                                    <label for="ac">AC</label>
                                </div>
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="power-mirror" checked>
                                    <label for="power-mirror">Power Mirror</label>
                                </div>
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="power-steering" checked>
                                    <label for="power-steering">Power Steering</label>
                                </div>
                                <div class="checkbox-wrapper">
                                    <input type="checkbox" id="power-window" checked>
                                    <label for="power-window">Power Window</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" id="predict-btn">
                        Estimate Price
                        <div class="spinner" id="loading-spinner"></div>
                    </button>
                </div>
            </form>
        </div>

        <div class="result-box" id="result-box">
            <div class="result-label">Estimated Market Value</div>
            <div class="result-price" id="result-price">LKR 0</div>
            <div class="result-subtitle" id="result-settings">Analysis based on specifications</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
